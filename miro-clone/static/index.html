<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miro Clone MVP</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Using a stable older version of Fabric.js for MVP simplicity -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uuid@8.3.2/dist/umd/uuidv4.min.js"></script>
</head>
<body>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2>Welcome to Miro Clone MVP</h2>
            <p>Enter a board ID and nickname to join</p>
            <input type="text" id="board-id-input" placeholder="Board ID (e.g. default)" value="default" />
            <input type="text" id="nickname-input" placeholder="Your Nickname" />
            <button id="join-btn">Join Board</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar" style="display: none; flex-wrap: wrap; max-width: 800px;">
        <button id="btn-rect">Add Rectangle</button>
        <button id="btn-circle">Add Circle</button>
        <button id="btn-text">Add Text</button>
        <button id="btn-line">Add Line</button>
        <button id="btn-arrow">Add Arrow</button>
        <button id="btn-polygon">Add Polygon</button>
        <button id="btn-freehand">Draw</button>
        <button id="btn-group">Group</button>
        <button id="btn-ungroup">Ungroup</button>
        <button id="btn-front">Bring to Front</button>
        <button id="btn-back">Send to Back</button>
        <button id="btn-clear">Clear Selection</button>
    </div>

    <!-- Property Panel -->
    <div id="property-panel" style="display: none;">
        <div>
            <label for="prop-fill">Fill Color:</label>
            <input type="color" id="prop-fill" value="#000000" />
        </div>
        <div>
            <label for="prop-stroke">Stroke Color:</label>
            <input type="color" id="prop-stroke" value="#000000" />
        </div>
        <div>
            <label for="prop-stroke-width">Stroke Width:</label>
            <input type="number" id="prop-stroke-width" min="0" max="50" value="1" />
        </div>
        <div>
            <label for="prop-font-family">Font Family:</label>
            <select id="prop-font-family">
                <option value="Arial">Arial</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
            </select>
        </div>
        <div>
            <label for="prop-font-size">Font Size:</label>
            <input type="number" id="prop-font-size" min="8" max="120" value="20" />
        </div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container" style="display: none;">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" style="display: none;">
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type a message..." />
            <button id="chat-send">Send</button>
        </div>
    </div>

    <!-- Cursors Container -->
    <div id="cursors-container"></div>
    <script src="/static/app.js"></script>
</body>
</html>
