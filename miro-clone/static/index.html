<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miro Clone MVP</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Using a stable older version of Fabric.js for MVP simplicity -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uuid@8.3.2/dist/umd/uuidv4.min.js"></script>
</head>
<body>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2>Welcome to Miro Clone MVP</h2>
            <p>Enter a board ID and nickname to join</p>
            <input type="text" id="board-id-input" placeholder="Board ID (e.g. default)" value="default" />
            <input type="text" id="nickname-input" placeholder="Your Nickname" />
            <button id="join-btn">Join Board</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar" style="display: none;">
        <button id="btn-rect">Add Rectangle</button>
        <button id="btn-circle">Add Circle</button>
        <button id="btn-text">Add Text</button>
        <button id="btn-sticky">Add Sticky</button>
        <button id="btn-line">Add Line</button>
        <button id="btn-arrow">Add Arrow</button>
        <button id="btn-polygon">Add Polygon</button>
        <button id="btn-freehand">Draw</button>
        <button id="btn-eraser">Eraser</button>
        <div class="separator"></div>
        <button id="btn-group">Group</button>
        <button id="btn-ungroup">Ungroup</button>
        <button id="btn-front">Bring to Front</button>
        <button id="btn-back">Send to Back</button>
        <button id="btn-clear">Clear Selection</button>
        <div class="separator"></div>
        <button id="btn-undo">Undo</button>
        <button id="btn-redo">Redo</button>
        <div class="separator"></div>
        <label><input type="checkbox" id="chk-grid-snap"> Snap to Grid</label>
    </div>

    <!-- Properties Panel -->
    <div id="properties-panel" style="display: none;">
        <div class="prop-group">
            <label for="prop-fill">Fill</label>
            <input type="color" id="prop-fill" value="#000000" />
        </div>
        <div class="prop-group">
            <label for="prop-stroke">Stroke</label>
            <input type="color" id="prop-stroke" value="#000000" />
        </div>
        <div class="prop-group">
            <label for="prop-stroke-width">Stroke Width</label>
            <input type="number" id="prop-stroke-width" value="1" min="0" max="50" />
        </div>
        <div class="prop-group">
            <label for="prop-font-family">Font</label>
            <select id="prop-font-family">
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
                <option value="Verdana">Verdana</option>
            </select>
        </div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container" style="display: none;">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" style="display: none;">
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type a message..." />
            <button id="chat-send">Send</button>
        </div>
    </div>


    <!-- Minimap Container -->
    <div id="minimap-container" style="display: none;">
        <canvas id="minimap" width="200" height="150"></canvas>
        <div id="minimap-viewport"></div>
    </div>

    <!-- Cursors Container -->
    <div id="cursors-container"></div>
    <script src="/static/app.js"></script>
</body>
</html>
