name: Tests

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./miro-clone

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Create uploads directory
        run: mkdir -p uploads

      - name: Run tests with coverage
        run: UV_PROJECT_ENVIRONMENT=$(pwd)/.venv uv run pytest --cov=src --cov-fail-under=90
